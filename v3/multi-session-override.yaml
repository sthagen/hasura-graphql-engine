# Multi-session override for v3-engine.
# Strips all fixed host port bindings and container_name so that multiple
# parallel `docker compose -p <project>` instances can run without conflicts.
#
# Only the engine and Jaeger UI are re-exposed via env-var ports.
# All other services communicate over the project-scoped Docker network.

services:
  engine:
    container_name: !reset null
    ports: !override
      - "${ENGINE_HOST_PORT:-3000}:3000"

  postgres:
    container_name: !reset null
    ports: !override []

  auth_hook:
    container_name: !reset null
    ports: !override []

  pre_ndc_request_plugin_example:
    container_name: !reset null
    ports: !override []

  pre_ndc_response_plugin_example:
    container_name: !reset null
    ports: !override []

  pre_parse_plugin_example:
    container_name: !reset null
    ports: !override []

  jaeger:
    container_name: !reset null
    ports: !override
      - "${JAEGER_HOST_PORT:-4002}:16686"

  postgres_connector_ndc_v01:
    container_name: !reset null
    ports: !override []

  postgres_connector:
    container_name: !reset null
    ports: !override []

  custom_connector:
    container_name: !reset null
    ports: !override []

  custom_connector_no_relationships:
    container_name: !reset null
    ports: !override []

  custom_connector_ndc_v01:
    container_name: !reset null
    ports: !override []
